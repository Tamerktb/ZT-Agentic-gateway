<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#666"/>
    </marker>
    <linearGradient id="gw" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a73e8"/><stop offset="100%" stop-color="#0d47a1"/></linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34a853"/><stop offset="100%" stop-color="#1b5e20"/></linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ea4335"/><stop offset="100%" stop-color="#b71c1c"/></linearGradient>
    <linearGradient id="svc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbc04"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
    <linearGradient id="tool" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Zero Trust Agentic AI Gateway — Architecture</text>

  <!-- Agent box -->
  <rect x="50" y="70" width="140" height="60" rx="8" fill="url(#svc)" stroke="#e65100" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">AI Agent</text>
  <text x="120" y="116" text-anchor="middle" fill="#fff" font-size="10">(NHI: shopping-agent)</text>

  <!-- Arrow Agent → Gateway -->
  <line x1="190" y1="100" x2="240" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="92" text-anchor="middle" fill="#888" font-size="9">action</text>

  <!-- AI Gateway box -->
  <rect x="250" y="55" width="180" height="90" rx="8" fill="url(#gw)" stroke="#0d47a1" stroke-width="2"/>
  <text x="340" y="78" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">AI Gateway</text>
  <text x="340" y="94" text-anchor="middle" fill="#ccc" font-size="10">:8000</text>
  <text x="340" y="112" text-anchor="middle" fill="#aad4ff" font-size="10">5-Stage Middleware</text>
  <text x="340" y="128" text-anchor="middle" fill="#aad4ff" font-size="10">Pipeline</text>

  <!-- Pipeline stages below gateway -->
  <rect x="250" y="160" width="180" height="140" rx="6" fill="#2d2d3d" stroke="#555" stroke-width="1"/>
  <text x="340" y="178" text-anchor="middle" fill="#aaa" font-size="10">Enforcement Pipeline</text>

  <rect x="262" y="188" width="156" height="20" rx="4" fill="#0d47a1"/>
  <text x="340" y="203" text-anchor="middle" fill="#fff" font-size="10">① Authenticate (JWT)</text>

  <rect x="262" y="212" width="156" height="20" rx="4" fill="#1a73e8"/>
  <text x="340" y="227" text-anchor="middle" fill="#fff" font-size="10">② Policy Check (OPA)</text>

  <rect x="262" y="236" width="156" height="20" rx="4" fill="#0d47a1"/>
  <text x="340" y="251" text-anchor="middle" fill="#fff" font-size="10">③ Rate Limit</text>

  <rect x="262" y="260" width="156" height="20" rx="4" fill="#1a73e8"/>
  <text x="340" y="275" text-anchor="middle" fill="#fff" font-size="10">④ Prompt Inspection</text>

  <rect x="262" y="284" width="156" height="20" rx="4" fill="#0d47a1"/>
  <text x="340" y="299" text-anchor="middle" fill="#fff" font-size="10">⑤ Audit Log (Hash-chain)</text>

  <!-- Arrow Gateway → Tools -->
  <line x1="430" y1="100" x2="490" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="92" text-anchor="middle" fill="#888" font-size="9">if ALLOWED</text>

  <!-- Tools box -->
  <rect x="500" y="55" width="140" height="60" rx="8" fill="url(#tool)" stroke="#4a148c" stroke-width="2"/>
  <text x="570" y="80" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Tools / APIs</text>
  <text x="570" y="98" text-anchor="middle" fill="#ddd" font-size="10">purchase_item</text>

  <!-- Supporting services -->
  <rect x="500" y="160" width="140" height="35" rx="6" fill="url(#svc)" stroke="#e65100" stroke-width="1.5"/>
  <text x="570" y="182" text-anchor="middle" fill="#fff" font-size="11">Identity Provider</text>
  <text x="570" y="193" text-anchor="middle" fill="#ddd" font-size="8">:8001</text>

  <rect x="500" y="205" width="140" height="35" rx="6" fill="url(#svc)" stroke="#e65100" stroke-width="1.5"/>
  <text x="570" y="227" text-anchor="middle" fill="#fff" font-size="11">Credential Vault</text>
  <text x="570" y="238" text-anchor="middle" fill="#ddd" font-size="8">:8002</text>

  <rect x="500" y="250" width="140" height="35" rx="6" fill="url(#svc)" stroke="#e65100" stroke-width="1.5"/>
  <text x="570" y="272" text-anchor="middle" fill="#fff" font-size="11">Audit Service</text>
  <text x="570" y="283" text-anchor="middle" fill="#ddd" font-size="8">:8004</text>

  <!-- Dotted lines from gateway to services -->
  <line x1="340" y1="160" x2="340" y2="320" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="340" y1="320" x2="570" y2="320" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="320" x2="570" y2="290" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Block result arrow -->
  <rect x="440" y="200" width="120" height="30" rx="15" fill="url(#block)" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="500" y="219" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">BLOCKED</text>
  <text x="500" y="232" text-anchor="middle" fill="#ffcdd2" font-size="9">401/403/400/429</text>

  <line x1="430" y1="130" x2="460" y2="200" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="690" y="55" width="190" height="200" rx="6" fill="#2d2d3d" stroke="#555" stroke-width="1"/>
  <text x="785" y="75" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Attack Surface Coverage</text>

  <rect x="700" y="85" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="93" fill="#ccc" font-size="10">Prompt Injection → Blocked</text>

  <rect x="700" y="105" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="113" fill="#ccc" font-size="10">Privilege Escalation → Blocked</text>

  <rect x="700" y="125" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="133" fill="#ccc" font-size="10">Credential Theft → Blocked</text>

  <rect x="700" y="145" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="153" fill="#ccc" font-size="10">Runaway Agent → Throttled</text>

  <rect x="700" y="165" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="173" fill="#ccc" font-size="10">Data Exfiltration → Blocked</text>

  <rect x="700" y="185" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="193" fill="#ccc" font-size="10">Audit Tampering → Detected</text>

  <rect x="700" y="205" width="8" height="8" rx="2" fill="#34a853"/>
  <text x="715" y="213" fill="#ccc" font-size="10">Invalid JWT → 401</text>

  <!-- Footer -->
  <text x="450" y="370" text-anchor="middle" fill="#666" font-size="9">git clone &amp;&amp; make build &amp;&amp; make up &amp;&amp; make demo-all</text>

  <!-- Terraform box -->
  <rect x="690" y="270" width="190" height="35" rx="6" fill="#0d47a1" stroke="#1a73e8" stroke-width="1"/>
  <text x="785" y="292" text-anchor="middle" fill="#fff" font-size="11">AWS Deployment (Terraform)</text>

  <rect x="690" y="310" width="190" height="35" rx="6" fill="#1b5e20" stroke="#34a853" stroke-width="1"/>
  <text x="785" y="332" text-anchor="middle" fill="#fff" font-size="11">Wazuh SIEM Monitoring</text>
</svg>
