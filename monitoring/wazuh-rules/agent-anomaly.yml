---
# Wazuh custom rules for Zero Trust Agentic AI Gateway monitoring
# ID Range: 5740-5759

groups:
  - zero_trust_gateway

rules:
  - id: 5740
    level: 10
    description: "Zero Trust Gateway - Agent authentication failure"
    groups: ["zero_trust", "authentication"]
    if_fts: 5
    match: "Auth failed"
    regex: "Auth failed: (.*)"
    alert_fields:
      agent_id: "$1"
    mitre:
      id: T1078
      tactic: "Defense Evasion"
      technique: "Valid Accounts"

  - id: 5741
    level: 12
    description: "Zero Trust Gateway - Prompt injection detected"
    groups: ["zero_trust", "injection"]
    match: "Prompt injection detected"
    regex: "Prompt injection detected for (.*): matched"
    alert_fields:
      agent_id: "$1"
    mitre:
      id: T1566
      tactic: "Initial Access"
      technique: "Phishing"

  - id: 5742
    level: 10
    description: "Zero Trust Gateway - Policy violation"
    groups: ["zero_trust", "policy"]
    match: "Policy DENY"
    regex: "Policy DENY: (.*)"
    alert_fields:
      agent_id: "$1"
    mitre:
      id: T1548
      tactic: "Privilege Escalation"
      technique: "Abuse Elevation Control Mechanism"

  - id: 5743
    level: 8
    description: "Zero Trust Gateway - Rate limit exceeded"
    groups: ["zero_trust", "anomaly"]
    match: "Rate limit exceeded"
    regex: "Rate limit exceeded for (.*):"
    alert_fields:
      agent_id: "$1"
    mitre:
      id: T1499
      tactic: "Impact"
      technique: "Endpoint Denial of Service"

  - id: 5744
    level: 12
    description: "Zero Trust Gateway - Data exfiltration attempt"
    groups: ["zero_trust", "exfiltration"]
    match: "Exfiltration attempt detected"
    regex: "Exfiltration attempt detected for (.*):"
    alert_fields:
      agent_id: "$1"
    mitre:
      id: T1048
      tactic: "Exfiltration"
      technique: "Exfiltration Over Alternative Protocol"

  - id: 5745
    level: 14
    description: "Zero Trust Gateway - Kill switch activated"
    groups: ["zero_trust", "incident_response"]
    match: "KILL SWITCH ACTIVATED"
    regex: "KILL SWITCH ACTIVATED for agent: (.*)"
    alert_fields:
      agent_id: "$1"
    mitre:
      id: T1485
      tactic: "Impact"
      technique: "Data Destruction"

  - id: 5746
    level: 8
    description: "Zero Trust Gateway - Credential check-out anomaly"
    groups: ["zero_trust", "credential_access"]
    match: "Credential CHECKED OUT"
    regex: "Credential CHECKED OUT: tool=(.*) agent=(.*)"
    alert_fields:
      tool: "$1"
      agent_id: "$2"
    mitre:
      id: T1528
      tactic: "Credential Access"
      technique: "Steal Application Access Token"

  - id: 5747
    level: 10
    description: "Zero Trust Gateway - Multiple denied actions from same agent"
    groups: ["zero_trust", "compromise"]
    if_group: "zero_trust_gateway"
    frequency: 5
    timeframe: 300
    same_field: "agent_id"
    regex: "DENIED"
    description: "Agent (.*) has 5+ denied actions in 5 minutes - possible compromise"
    mitre:
      id: T1078
      tactic: "Persistence"
      technique: "Valid Accounts"
