version: "3.9"

services:
  ai-gateway:
    build: ./services/ai-gateway
    ports:
      - "8000:8000"
    environment:
      - IDENTITY_PROVIDER_URL=http://identity-provider:8001
      - CREDENTIAL_VAULT_URL=http://credential-vault:8002
      - POLICY_ENGINE_URL=http://policy-engine:8003
      - AUDIT_SERVICE_URL=http://audit-service:8004
      - LOG_LEVEL=INFO
    depends_on:
      identity-provider:
        condition: service_healthy
      credential-vault:
        condition: service_healthy
      policy-engine:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    networks:
      - zt-network
    restart: unless-stopped

  identity-provider:
    build: ./services/identity-provider
    ports:
      - "8001:8001"
    environment:
      - JWT_SECRET=zt-lab-secret-change-in-prod
      - LOG_LEVEL=INFO
    networks:
      - zt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  credential-vault:
    build: ./services/credential-vault
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
    networks:
      - zt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  policy-engine:
    build: ./services/policy-engine
    ports:
      - "8003:8003"
    environment:
      - LOG_LEVEL=INFO
    networks:
      - zt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  audit-service:
    build: ./services/audit-service
    ports:
      - "8004:8004"
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - audit-data:/app/data
    networks:
      - zt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  demo-agents:
    build: ./services/demo-agents
    environment:
      - GATEWAY_URL=http://ai-gateway:8000
    depends_on:
      ai-gateway:
        condition: service_started
    networks:
      - zt-network
    profiles:
      - demo
    restart: "no"

  attack-simulator:
    build: ./services/attack-simulator
    environment:
      - GATEWAY_URL=http://ai-gateway:8000
    depends_on:
      ai-gateway:
        condition: service_started
    networks:
      - zt-network
    profiles:
      - demo
    restart: "no"

networks:
  zt-network:
    driver: bridge

volumes:
  audit-data:
